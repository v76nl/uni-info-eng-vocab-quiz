<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>情報英語 単語クイズ</title>
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="/src/style.css"
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❓</text></svg>"
        />
    </head>
    <body>
        <nav id="nav-menu">
            <button
                id="btn-quiz"
                class="nav-btn active"
            >
                クイズ
            </button>
            <button
                id="btn-wordbook"
                class="nav-btn"
            >
                単語帳
            </button>
            <button
                id="btn-list"
                class="nav-btn"
            >
                単語一覧
            </button>
        </nav>
        <div id="app">
            <h1 id="header-title">情報英語 単語クイズ</h1>
            <div id="quiz-container">
                <p id="question">読み込み中...</p>
                <div id="options"></div>
                <button
                    id="btn-skip"
                    class="skip-btn"
                >
                    スキップ
                </button>
                <p id="feedback"></p>
            </div>
            <div
                id="wordbook-container"
                class="hidden"
            >
                <h2>単語帳</h2>
                <div class="scroll-fade-container">
                    <div class="table-wrapper">
                        <table id="wordbook-table">
                            <thead>
                                <tr>
                                    <th>単語</th>
                                    <th>意味</th>
                                </tr>
                            </thead>
                            <tbody id="wordbook-list-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div
                id="list-container"
                class="hidden"
            >
                <h2>収録単語一覧</h2>
                <div class="scroll-fade-container">
                    <div class="table-wrapper">
                        <table id="vocab-table">
                            <thead>
                                <tr>
                                    <th>単語</th>
                                    <th>意味</th>
                                </tr>
                            </thead>
                            <tbody id="vocab-list-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <a
                href="https://github.com/v76nl/uni-info-eng-vocab-quiz"
                aria-label="GitHub Repository"
            >
                <svg
                    height="32"
                    aria-hidden="true"
                    viewBox="0 0 16 16"
                    version="1.1"
                    width="32"
                    fill="currentColor"
                >
                    <path
                        fill-rule="evenodd"
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                    ></path>
                </svg>
            </a>
        </footer>
        <script
            type="module"
            src="/src/main.ts"
        ></script>
    </body>
</html>
